name: Build My Dist

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 检查代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20   # 升级 Node 版本

      - name: 查看系统资源
        run: free -h

      - name: 强制安装依赖
        run: npm ci --legacy-peer-deps --no-audit --no-fund

      - name: 执行编译
        run: npm run build
        env:
          NODE_OPTIONS: "--max-old-space-size=6144 --openssl-legacy-provider"
          GENERATE_SOURCEMAP: false   # 可选：关闭 source map

      - name: 上传编译产物
        uses: actions/upload-artifact@v4
        with:
          name: EZ-THEME-DIST
          path: dist/
