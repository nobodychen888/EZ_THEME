name: Build My Dist

on:
  workflow_dispatch: # 允许你手动点击开始编译

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 检查代码
        uses: actions/checkout@v4  # 已升级到 v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4  # 已升级到 v4
        with:
          node-version: 18

      - name: 安装依赖并编译
        run: |
          npm install
          npm run build

      - name: 上传编译产物
        uses: actions/upload-artifact@v4  # 已升级到 v4
        with:
          name: EZ-THEME-DIST
          path: dist/
