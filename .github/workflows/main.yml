name: Build My Dist

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest # 使用最新系统

    steps:
      - name: 检查代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 16 # 16 版本相对均衡

      - name: 强制安装依赖
        run: |
          npm install --legacy-peer-deps --no-audit --no-fund # 减少不必要的检查以节省内存

      - name: 执行编译
        # 这里是关键：限制 Node 内存为 4GB，并开启旧版加密兼容
        run: npm run build
        env:
          NODE_OPTIONS: "--max-old-space-size=4096 --openssl-legacy-provider"

      - name: 上传编译产物
        uses: actions/upload-artifact@v4
        with:
          name: EZ-THEME-DIST
          path: dist/
