name: Build My Dist

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest 

    steps:
      - name: 检查代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 14 

      - name: 安装依赖
        run: npm install --legacy-peer-deps

      - name: 执行编译
        # 增加 --max_old_space_size 是为了防止老项目在编译时因为内存不足而崩溃
        run: npm run build
        env:
          NODE_OPTIONS: --max_old_space_size=4096

      - name: 上传编译产物
        uses: actions/upload-artifact@v4
        with:
          name: EZ-THEME-DIST
          path: dist/
