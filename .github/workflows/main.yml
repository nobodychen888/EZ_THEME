name: Build My Dist

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 检查代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 检查源码文件（调试）
        run: |
          find src -type f -name "*.vue" | sort
          echo "=== 检查缺失文件 ==="
          for file in src/components/icons/IconWallet.vue src/components/shop/ShopPopup.vue src/components/ticket/TicketPopup.vue; do
            if [ -f "$file" ]; then
              echo "✓ $file 存在"
            else
              echo "✗ $file 不存在"
            fi
          done

      - name: 安装依赖
        run: npm install --legacy-peer-deps --no-audit --no-fund

      - name: 执行编译
        run: npm run build
        env:
          NODE_OPTIONS: "--max-old-space-size=6144 --openssl-legacy-provider"
          GENERATE_SOURCEMAP: false

      - name: 上传编译产物
        uses: actions/upload-artifact@v4
        with:
          name: EZ-THEME-DIST
          path: dist/
